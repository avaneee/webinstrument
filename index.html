    <script>
        let handshake = document.querySelector("#handshake");
        handshake.addEventListener('click', function () {
            Tone.start();
            handshake.style.display = 'none';
        });

        let synth = new Tone.Synth().toDestination();

        let buttons = document.querySelectorAll('.playButton');

        let currentNote = 660;

        let starColors = ["hsl(55, 100%, 92%)",
            "hsl(55, 95%, 85%)",
            "hsl(55, 90%, 78%)",
            "hsl(55, 85%, 70%)",
            "hsl(55, 80%, 62%)",
            "hsl(55, 85%, 55%)",
            "hsl(55, 90%, 50%)",
            "hsl(50, 95%, 48%)",
            "hsl(48, 100%, 45%)",
            "hsl(45, 100%, 42%)"]

        let rotations = 0;

        buttons.forEach(function (button) {

            let storedNote = currentNote;

            // stars resizing and twinkling in general
            setInterval(() => {
                let randomScale = Math.random() * 0.2 + 0.8;     
                let opacity = Math.random() * 0.3 + 0.7;   

                button.style.transform = `scale(${randomScale})`;
                button.style.opacity = opacity;
            }, 500 + Math.random() * 500); 

            // when hovering
            button.addEventListener('mouseenter', function () {

                let randomColor = starColors[Math.floor(Math.random() * starColors.length)];
        
                button.style.backgroundColor = randomColor;

                let randomSize = Math.random() * 1 + 0.6;
                let randomRotation = Math.random() * 360 - 100;

                button.style.transform = `rotate(${randomRotation}deg) scale(${randomSize})`;

                synth.triggerAttackRelease(storedNote, "4n");
            });

            currentNote += 10;
        })

    </script>
